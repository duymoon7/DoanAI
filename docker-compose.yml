version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: electronics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: electronics_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - electronics_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d electronics_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # pgAdmin
  pgadmin:
    image: dpage/pgadmin4
    container_name: electronics_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - electronics_network
    depends_on:
      - postgres

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: electronics_backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: electronics_db
      DB_USER: postgres
      DB_PASSWORD: 123456
      APP_ENV: development
      DEBUG: "True"
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    networks:
      - electronics_network
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  electronics_network:
    driver: bridge
    name: electronics_network
